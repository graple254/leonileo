<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00C170;
            --green-dark: #009955;
            --green-pale: #e6fff5;
            --ink: #0d1f15;
            --mist: #f2faf6;
            --mid: #6b8f79;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--mist);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .bg-blob-1 {
            width: 500px; height: 500px;
            background: var(--green);
            top: -150px; right: -100px;
            animation-delay: 0s;
        }
        .bg-blob-2 {
            width: 350px; height: 350px;
            background: #00e68a;
            bottom: -100px; left: -80px;
            animation-delay: -3s;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 28px;
            padding: 56px 48px 48px;
            max-width: 460px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 48px rgba(0,193,112,0.10), 0 2px 12px rgba(0,0,0,0.06);
            position: relative;
            z-index: 1;
            animation: rise 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Check circle */
        .check-wrap {
            width: 88px;
            height: 88px;
            background: var(--green-pale);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: pop 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes pop {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .check-wrap svg {
            width: 44px;
            height: 44px;
        }
        .check-circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            animation: stroke 0.5s 0.5s ease forwards;
        }
        .check-mark {
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.4s 0.9s ease forwards;
        }
        @keyframes stroke {
            to { stroke-dashoffset: 0; }
        }

        /* Confetti dots */
        .confetti {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 28px;
        }
        .dot {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: fall 1.4s ease-out forwards;
            opacity: 0;
        }
        @keyframes fall {
            0%   { opacity: 1; transform: translateY(-10px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(120px) rotate(360deg); }
        }

        /* Text */
        .label {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--green);
            margin-bottom: 10px;
            animation: fadein 0.4s 0.6s both;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--ink);
            line-height: 1.15;
            margin-bottom: 14px;
            animation: fadein 0.4s 0.7s both;
        }
        p {
            font-size: 15px;
            font-weight: 300;
            color: var(--mid);
            line-height: 1.6;
            margin-bottom: 36px;
            animation: fadein 0.4s 0.8s both;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4ede0, transparent);
            margin-bottom: 28px;
            animation: fadein 0.4s 0.9s both;
        }

        /* Info row */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 14px;
            animation: fadein 0.4s 1s both;
            border-bottom: 1px dashed #e8f5ed;
        }
        .info-row:last-of-type { border-bottom: none; }
        .info-label { color: var(--mid); font-weight: 400; }
        .info-val { color: var(--ink); font-weight: 500; }
        .info-val.green { color: var(--green-dark); font-weight: 600; }

        /* CTA */
        .cta-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            animation: fadein 0.4s 1.1s both;
        }
        .btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: transform 0.15s, box-shadow 0.15s;
            border: none;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary {
            background: var(--green);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,193,112,0.30);
        }
        .btn-primary:hover { box-shadow: 0 6px 24px rgba(0,193,112,0.40); }
        .btn-ghost {
            background: var(--mist);
            color: var(--ink);
            border: 1.5px solid #d0e8da;
        }
        .btn-ghost:hover { background: #e3f5ec; }

        /* WhatsApp note */
        .wa-note {
            margin-top: 20px;
            padding: 14px 16px;
            background: #f0fff8;
            border-radius: 12px;
            border: 1px solid #b6eed5;
            font-size: 13px;
            color: var(--mid);
            animation: fadein 0.4s 1.2s both;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }
        .wa-note svg { flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="card">
        <!-- Confetti -->
        <div class="confetti" id="confetti"></div>

        <!-- Check icon -->
        <div class="check-wrap">
            <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="check-circle" cx="26" cy="26" r="25"
                    stroke="#00C170" stroke-width="2" fill="none"/>
                <path class="check-mark" d="M14 27l8 8 16-16"
                    stroke="#00C170" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
        </div>

        <div class="label">M-Pesa Payment</div>
        <h1>Payment Received!</h1>
        <p>Your payment has gone through successfully. The merchant will be in touch with you shortly on WhatsApp to confirm your order.</p>

        <div class="divider"></div>

        <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-val green">✓ Confirmed</span>
        </div>
        <div class="info-row">
            <span class="info-label">Method</span>
            <span class="info-val">M-Pesa (Lipana)</span>
        </div>

        <div class="cta-group">
            <a href="/" class="btn btn-primary">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/>
                </svg>
                Back to Shop
            </a>
            <a href="javascript:window.close()" class="btn btn-ghost">Close</a>
        </div>

        <div class="wa-note">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#25D366">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <span>The merchant will confirm your order and delivery details via <strong>WhatsApp</strong>.</span>
        </div>
    </div>

    <script>
        // Spawn confetti dots on load
        const colors = ['#00C170','#00e68a','#b6eed5','#FFD600','#FF6B6B','#4ECDC4'];
        const container = document.getElementById('confetti');
        for (let i = 0; i < 24; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${10 + Math.random() * 30}%;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                animation-delay: ${Math.random() * 0.8}s;
                animation-duration: ${1.2 + Math.random() * 0.8}s;
                width: ${5 + Math.random() * 7}px;
                height: ${5 + Math.random() * 7}px;
            `;
            container.appendChild(dot);
        }
    </script>
</body>
</html>
